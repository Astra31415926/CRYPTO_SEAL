<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Seal Interface</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Главный контейнер (16:9) */
        .interface-container {
            position: relative;
            width: 1920px;
            height: 1080px;
            background: url('004.jpg') no-repeat center center;
            background-size: contain;
            user-select: none;
        }

        /* Зоны ховера (проявление белых надписей из 003.jpg) */
        .hover-zone {
            position: absolute;
            cursor: pointer;
        }
        .hover-zone:hover {
            background-image: url('003.jpg');
            background-repeat: no-repeat;
        }

        /* Точные координаты кнопок */
        .zone-create { left: 306px; top: 227px; width: 283px; height: 54px; }
        .zone-create:hover { background-position: -306px -227px; }

        .zone-scan { left: 1105px; top: 225px; width: 283px; height: 54px; }
        .zone-scan:hover { background-position: -1105px -225px; }

        .zone-rules { left: 707px; top: 834px; width: 269px; height: 57px; }
        .zone-rules:hover { background-position: -707px -834px; }

        .zone-back { left: 610px; top: 827px; width: 79px; height: 56px; }
        .zone-back:hover { background-position: -610px -827px; }

        .zone-save { left: 999px; top: 826px; width: 60px; height: 68px; }
        .zone-save:hover { background-position: -999px -826px; }

        /* Текстовые замки кодом */
        .lock-text {
            position: absolute;
            font-weight: bold;
            font-size: 20px;
            color: #4af626;
            text-shadow: 0 0 8px rgba(74, 246, 38, 0.7);
            text-transform: uppercase;
        }
        #lock-left { left: 395px; top: 585px; }   
        #lock-right { left: 1195px; top: 585px; }

        /* Точное центральное окно из Фотошопа */
        .center-window {
            position: absolute;
            left: 651px; 
            top: 250px; 
            width: 440px; 
            height: 388px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .center-window img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: color-dodge; /* Режим: Яркий свет */
        }

        /* Всплывающий выбор SCAN */
        .scan-menu {
            display: none;
            position: absolute;
            gap: 20px;
            z-index: 10;
        }
        .scan-btn {
            padding: 12px 24px;
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #4af626;
            color: #4af626;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(74, 246, 38, 0.3);
        }

        /* Поля ввода по твоим точным координатам */
        .input-field {
            position: absolute;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 18px;
            outline: none;
            padding: 5px;
        }
        /* Окно ввода секретного текста (Снимок экрана 23:35:46) */
        #input-text { 
            left: 511px; 
            top: 739px; 
            width: 720px; 
            height: 62px; 
            resize: none; 
        }
        /* Поле ввода ключа пароля (Снимок экрана 23:34:40) */
        #input-key { 
            left: 679px; 
            top: 667px; 
            width: 383px; 
            height: 48px; 
        }

        /* Элемент скрытого выбора файла */
        #file-chooser { display: none; }

        /* Экрана ошибки: Чудик-шпион */
        .spy-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff3333;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
        }
        .spy-overlay img {
            max-width: 250px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="interface-container">
    <div class="hover-zone zone-create" id="action-create"></div>
    <div class="hover-zone zone-scan" id="action-scan"></div>
    <div class="hover-zone zone-rules" id="action-rules"></div>
    <div class="hover-zone zone-back" id="action-back"></div>
    <div class="hover-zone zone-save" id="action-save"></div>

    <div class="lock-text" id="lock-left">OPEN</div>
    <div class="lock-text" id="lock-right">OPEN</div>

    <div class="center-window" id="window-display">
        <div class="scan-menu" id="scan-menu">
            <button class="scan-btn" id="choice-camera">CAMERA</button>
            <button class="scan-btn" id="choice-gallery">GALLERY</button>
        </div>
        <img id="ornament-view" src="" style="display:none;">
    </div>

    <textarea class="input-field" id="input-text" placeholder=""></textarea>
    <input type="text" class="input-field" id="input-key" placeholder="">
    <input type="file" id="file-chooser" accept="image/*">

    <div class="spy-overlay" id="spy-screen">
        <img src="spy.png" alt="Шпион"> <div>Держава не доверяет вам<br><span style="font-size: 20px; color: #aaa;">The State does not trust you</span></div>
    </div>
</div>

<script>
    const inputText = document.getElementById('input-text');
    const inputKey = document.getElementById('input-key');
    const lockLeft = document.getElementById('lock-left');
    const lockRight = document.getElementById('lock-right');
    const actionScan = document.getElementById('action-scan');
    const scanMenu = document.getElementById('scan-menu');
    const choiceGallery = document.getElementById('choice-gallery');
    const fileChooser = document.getElementById('file-chooser');
    const ornamentView = document.getElementById('ornament-view');
    const spyScreen = document.getElementById('spy-screen');

    // Логика замков: Ввод текста закрывает их (появляется CLOSED)
    inputText.addEventListener('input', () => {
        lockLeft.textContent = inputText.value.length >= 3 ? "CLOSED" : "OPEN";
    });

    inputKey.addEventListener('input', () => {
        lockRight.textContent = inputKey.value.length >= 6 ? "CLOSED" : "OPEN";
        
        // Проверка ключа: если введено неправильно (например 'wrong'), вылетает шпион
        if(inputKey.value === 'wrong') {
            spyScreen.style.display = 'flex';
            setTimeout(() => { 
                spyScreen.style.display = 'none'; 
                inputKey.value = ''; 
                lockRight.textContent = "OPEN";
            }, 4000);
        }
    });

    // Нажатие на кнопку SCAN
    actionScan.addEventListener('click', () => {
        scanMenu.style.display = 'flex';
        ornamentView.style.display = 'none';
    });

    // Нажатие на GALLERY вызывает системный выбор файла
    choiceGallery.addEventListener('click', () => {
        fileChooser.click();
    });

    // Логика после выбора картинки из галереи
    fileChooser.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        scanMenu.style.display = 'none';
        
        // Показываем выбранную картинку в центральном окне
        const reader = new FileReader();
        reader.onload = function(event) {
            ornamentView.src = event.target.result;
            ornamentView.style.display = 'block';
        };
        reader.readAsDataURL(file);

        // Симуляция считывания текста. Поменяй на свою логику чтения кода.
        let textFromImage = "Секретный текст зашифрован="; 

        // Проверка на знак "=" в конце текста
        if(textFromImage.endsWith('=')) {
            inputKey.focus(); // Курсор начинает мерцать в поле ввода ключа
        } else {
            inputText.value = textFromImage;
            lockLeft.textContent = "CLOSED";
        }
    });
</script>

</body>
</html>
