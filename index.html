<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Seal Interface</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Главный контейнер по размерам твоего монитора/макета */
        .interface-container {
            position: relative;
            width: 1920px;
            height: 1080px;
            background: url('004.jpg') no-repeat center center;
            background-size: contain;
            user-select: none;
        }

        /* Общие интерактивные зоны для проявления белых надписей из 003.jpg */
        .hover-zone {
            position: absolute;
            cursor: pointer;
        }
        .hover-zone:hover {
            background-image: url('003.jpg');
            background-repeat: no-repeat;
        }

        /* Координаты зон по твоим замерам */
        .zone-create { left: 306px; top: 227px; width: 283px; height: 54px; }
        .zone-create:hover { background-position: -306px -227px; }

        .zone-scan { left: 1105px; top: 225px; width: 283px; height: 54px; }
        .zone-scan:hover { background-position: -1105px -225px; }

        .zone-rules { left: 707px; top: 834px; width: 269px; height: 57px; }
        .zone-rules:hover { background-position: -707px -834px; }

        .zone-back { left: 610px; top: 827px; width: 79px; height: 56px; }
        .zone-back:hover { background-position: -610px -827px; }

        .zone-save { left: 999px; top: 826px; width: 60px; height: 68px; }
        .zone-save:hover { background-position: -999px -826px; }

        /* Текстовые замки */
        .lock-text {
            position: absolute;
            font-weight: bold;
            font-size: 14px;
            color: #4af626; /* Зеленоватый программный цвет, можно заменить на любой */
            text-shadow: 0 0 5px rgba(74, 246, 38, 0.5);
            text-transform: uppercase;
        }
        #lock-left { left: 395px; top: 585px; }   /* Подгони координаты под свои замки */
        #lock-right { left: 1195px; top: 585px; }

        /* Центральное окно и генерация орнамента */
        .center-window {
            position: absolute;
            left: 651px; top: 250px; width: 440px; height: 440px; /* Примерные размеры центра */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .center-window img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            mix-blend-mode: color-dodge; /* Режим: Яркий свет */
        }

        /* Всплывающие кнопки SCAN */
        .scan-menu {
            display: none;
            position: absolute;
            gap: 20px;
        }
        .scan-btn {
            padding: 10px 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #fff;
            color: #fff;
            cursor: pointer;
        }

        /* Поля ввода */
        .input-field {
            position: absolute;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        #input-text { left: 511px; top: 739px; width: 500px; height: 60px; resize: none; }
        #input-key { left: 679px; top: 667px; width: 200px; height: 30px; }

        /* Оверлей ошибки (Чудик-шпион) */
        .spy-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff3333;
            font-size: 24px;
            text-align: center;
        }
        .spy-overlay img {
            max-width: 300px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="interface-container">
    <div class="hover-zone zone-create" id="action-create"></div>
    <div class="hover-zone zone-scan" id="action-scan"></div>
    <div class="hover-zone zone-rules" id="action-rules"></div>
    <div class="hover-zone zone-back" id="action-back"></div>
    <div class="hover-zone zone-save" id="action-save"></div>

    <div class="lock-text" id="lock-left">OPEN</div>
    <div class="lock-text" id="lock-right">OPEN</div>

    <div class="center-window" id="window-display">
        <div class="scan-menu" id="scan-menu">
            <button class="scan-btn" id="choice-camera">CAMERA</button>
            <button class="scan-btn" id="choice-gallery">GALLERY</button>
        </div>
        <img id="ornament-view" src="" style="display:none;">
    </div>

    <textarea class="input-field" id="input-text" placeholder="Текст тайницы..."></textarea>
    <input type="text" class="input-field" id="input-key" placeholder="Ключ...">

    <div class="spy-overlay" id="spy-screen">
        <img src="spy.png" alt="Spy"> <div id="error-message">Держава не доверяет вам / The State does not trust you</div>
    </div>
</div>

<script>
    const inputText = document.getElementById('input-text');
    const inputKey = document.getElementById('input-key');
    const lockLeft = document.getElementById('lock-left');
    const lockRight = document.getElementById('lock-right');
    const actionScan = document.getElementById('action-scan');
    const scanMenu = document.getElementById('scan-menu');
    const choiceGallery = document.getElementById('choice-gallery');
    const ornamentView = document.getElementById('ornament-view');
    const spyScreen = document.getElementById('spy-screen');

    // Логика замков (ввод текста закрывает их)
    inputText.addEventListener('input', () => {
        lockLeft.textContent = inputText.value.length >= 3 ? "CLOSED" : "OPEN";
    });

    inputKey.addEventListener('input', () => {
        lockRight.textContent = inputKey.value.length >= 6 ? "CLOSED" : "OPEN";
        
        // Пример триггера проверки ключа (если ввели неправильный, допустим 'wrong')
        if(inputKey.value === 'wrong') {
            spyScreen.style.display = 'flex';
            setTimeout(() => { spyScreen.style.display = 'none'; inputKey.value = ''; }, 3000);
        }
    });

    // Нажатие на SCAN показывает подменю
    actionScan.addEventListener('click', () => {
        scanMenu.style.display = 'flex';
        ornamentView.style.display = 'none';
    });

    // Выбор ГАЛЕРЕИ
    choiceGallery.addEventListener('click', () => {
        scanMenu.style.display = 'none';
        
        // Симулируем загрузку картинки с кодом (в реале тут будет твой обработчик файла)
        // Допустим, считанный текст попал в переменную textFromImage
        let textFromImage = "Пример текста="; 

        ornamentView.src = "ornament.jpg"; // Тут будет сгенерированная картинка
        ornamentView.style.display = 'block';

        if(textFromImage.endsWith('=')) {
            inputKey.focus(); // Мерцает курсор в поле ключа
        } else {
            inputText.value = textFromImage;
        }
    });
</script>

</body>
</html>
