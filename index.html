<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Seal Interface</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        .interface-container {
            position: relative;
            width: 1920px;
            height: 1080px;
            background: url('004.jpg') no-repeat center center;
            background-size: contain;
            user-select: none;
        }

        .hover-zone {
            position: absolute;
            cursor: pointer;
        }
        .hover-zone:hover {
            background-image: url('003.jpg');
            background-repeat: no-repeat;
        }

        /* Точные координаты кнопок из Фотошопа */
        .zone-create { left: 419px; top: 290px; width: 291px; height: 53px; }
        .zone-create:hover { background-position: -419px -290px; }

        .zone-scan { left: 1228px; top: 291px; width: 293px; height: 57px; }
        .zone-scan:hover { background-position: -1228px -291px; }

        .zone-rules { left: 816px; top: 905px; width: 301px; height: 68px; }
        .zone-rules:hover { background-position: -816px -905px; }

        .zone-back { left: 734px; top: 907px; width: 71px; height: 53px; }
        .zone-back:hover { background-position: -734px -907px; }

        .zone-save { left: 1124px; top: 906px; width: 63px; height: 66px; }
        .zone-save:hover { background-position: -1124px -906px; }

        /* Зеленый текст индикаторов (выровнен по центру рамок замков) */
        .lock-text {
            position: absolute;
            font-weight: bold;
            font-size: 14px;
            color: #4af626;
            text-shadow: 0 0 5px rgba(74, 246, 38, 0.7);
            text-transform: uppercase;
            width: 108px;
            text-align: center;
            line-height: 35px;
        }
        #lock-left { left: 505px; top: 597px; height: 35px; }   
        #lock-right { left: 1331px; top: 597px; height: 34px; width: 109px; }

        /* Центральное окно орнамента */
        .center-window {
            position: absolute;
            left: 770px; 
            top: 314px; 
            width: 390px; 
            height: 390px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .center-window img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: color-dodge;
        }

        .scan-menu {
            display: none;
            position: absolute;
            gap: 20px;
            z-index: 10;
        }
        .scan-btn {
            padding: 12px 24px;
            background: rgba(15, 15, 15, 0.95);
            border: 2px solid #4af626;
            color: #4af626;
            font-weight: bold;
            cursor: pointer;
        }

        /* Поля ввода информации точно в рамки */
        .input-field {
            position: absolute;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 18px;
            outline: none;
            padding: 5px;
        }
        #input-key { 
            left: 800px; 
            top: 741px; 
            width: 332px; 
            height: 40px; 
        }
        #input-text { 
            left: 629px; 
            top: 814px; 
            width: 677px; 
            height: 58px; 
            resize: none; 
        }

        #file-chooser { display: none; }

        .spy-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff3333;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
        }
        .spy-overlay img {
            max-width: 250px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="interface-container">
    <div class="hover-zone zone-create" id="action-create"></div>
    <div class="hover-zone zone-scan" id="action-scan"></div>
    <div class="hover-zone zone-rules" id="action-rules"></div>
    <div class="hover-zone zone-back" id="action-back"></div>
    <div class="hover-zone zone-save" id="action-save"></div>

    <div class="lock-text" id="lock-left">OPEN</div>
    <div class="lock-text" id="lock-right">OPEN</div>

    <div class="center-window" id="window-display">
        <div class="scan-menu" id="scan-menu">
            <button class="scan-btn" id="choice-camera">CAMERA</button>
            <button class="scan-btn" id="choice-gallery">GALLERY</button>
        </div>
        <img id="ornament-view" src="" style="display:none;">
    </div>

    <input type="text" class="input-field" id="input-key">
    <textarea class="input-field" id="input-text"></textarea>
    <input type="file" id="file-chooser" accept="image/*">

    <div class="spy-overlay" id="spy-screen">
        <img src="spy.png" alt="Шпион">
        <div>Держава не доверяет вам<br><span style="font-size: 20px; color: #777;">The State does not trust you</span></div>
    </div>
</div>

<script>
    const inputText = document.getElementById('input-text');
    const inputKey = document.getElementById('input-key');
    const lockLeft = document.getElementById('lock-left');
    const lockRight = document.getElementById('lock-right');
    const actionScan = document.getElementById('action-scan');
    const scanMenu = document.getElementById('scan-menu');
    const choiceGallery = document.getElementById('choice-gallery');
    const fileChooser = document.getElementById('file-chooser');
    const ornamentView = document.getElementById('ornament-view');
    const spyScreen = document.getElementById('spy-screen');

    inputText.addEventListener('input', () => {
        lockLeft.textContent = inputText.value.length >= 3 ? "CLOSED" : "OPEN";
    });

    inputKey.addEventListener('input', () => {
        lockRight.textContent = inputKey.value.length >= 6 ? "CLOSED" : "OPEN";
        if(inputKey.value === 'wrong') {
            spyScreen.style.display = 'flex';
            setTimeout(() => { 
                spyScreen.style.display = 'none'; 
                inputKey.value = ''; 
                lockRight.textContent = "OPEN";
            }, 4000);
        }
    });

    actionScan.addEventListener('click', () => {
        scanMenu.style.display = 'flex';
        ornamentView.style.display = 'none';
    });

    choiceGallery.addEventListener('click', () => {
        fileChooser.click();
    });

    fileChooser.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        scanMenu.style.display = 'none';
        
        const reader = new FileReader();
        reader.onload = function(event) {
            ornamentView.src = event.target.result;
            ornamentView.style.display = 'block';
        };
        reader.readAsDataURL(file);

        let textFromImage = "Секретный код обнаружен="; 

        if(textFromImage.endsWith('=')) {
            inputKey.focus();
        } else {
            inputText.value = textFromImage;
            lockLeft.textContent = "CLOSED";
        }
    });
</script>

</body>
</html>
